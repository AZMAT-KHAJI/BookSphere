spring.application.name=library-booking-system
server.port=8080

# H2 in-memory database - zero setup needed
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 web console at /h2-console (useful for demo/interview - shows the raw tables live)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# How long a notified waitlist user has to confirm before it moves to next person.
# Set short (2 minutes) so it's easy to DEMO. In a real system this would be 24 hours.
waitlist.confirmation-window-minutes=2
